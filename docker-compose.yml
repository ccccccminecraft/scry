services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./database:/database
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////database/mtgo.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
